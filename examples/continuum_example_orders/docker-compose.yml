services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: continuum_example_orders_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: continuum_example_orders_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  jaeger:
    image: docker.io/jaegertracing/all-in-one:1.57
    container_name: continuum_example_orders_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
